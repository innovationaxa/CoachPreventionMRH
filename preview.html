<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Coach Prévention MRH V3 — Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
:root {
  /* ── AXA BRAND ── */
  --axa:        #00008F;
  --axa-dark:   #00006B;
  --axa-mid:    #1A1AB0;
  --axa-light:  #E8E8F8;
  --axa-xlight: #F3F3FC;

  /* ── SEMANTIC ── */
  --success:      #1A7A4A;
  --success-mid:  #24A865;
  --success-light:#E6F5ED;
  --success-bg:   #F0FAF5;

  --danger:       #B91C1C;
  --danger-mid:   #DC2626;
  --danger-light: #FEE2E2;
  --danger-bg:    #FFF5F5;

  --warn:         #92400E;
  --warn-mid:     #D97706;
  --warn-light:   #FEF3C7;
  --warn-bg:      #FFFBEB;

  --info:         #1E40AF;
  --info-mid:     #3B82F6;
  --info-light:   #DBEAFE;
  --info-bg:      #EFF6FF;

  /* ── NEUTRAL SCALE ── */
  --n950: #0A0A0F;
  --n900: #111118;
  --n800: #1E1E2A;
  --n700: #2D2D3E;
  --n600: #4A4A62;
  --n500: #6B6B85;
  --n400: #9494AA;
  --n300: #BCBCCC;
  --n200: #DCDCE8;
  --n150: #EAEAF2;
  --n100: #F2F2F8;
  --n50:  #F8F8FC;
  --white: #FFFFFF;

  /* ── RISK COLORS ── */
  --risk-flood:   #1E40AF;
  --risk-flood-l: #DBEAFE;
  --risk-fire:    #B91C1C;
  --risk-fire-l:  #FEE2E2;
  --risk-water:   #0E7490;
  --risk-water-l: #CFFAFE;
  --risk-theft:   #4C1D95;
  --risk-theft-l: #EDE9FE;
  --risk-rga:     #92400E;
  --risk-rga-l:   #FEF3C7;

  /* ── SPACING ── */
  --sp1: 4px;  --sp2: 8px;  --sp3: 12px; --sp4: 16px;
  --sp5: 20px; --sp6: 24px; --sp8: 32px; --sp10: 40px;

  /* ── RADIUS ── */
  --r-xs: 4px; --r-sm: 8px; --r-md: 12px;
  --r-lg: 16px; --r-xl: 20px; --r-pill: 999px;

  /* ── TYPE ── */
  --font: 'DM Sans', -apple-system, sans-serif;

  /* ── SHADOW ── */
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.06);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.10), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-device: 0 24px 64px rgba(0,0,143,0.16), 0 8px 24px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.06);

  /* ── DEVICE ── */
  --device-w: 375px;
  --device-h: 800px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  font-family: var(--font);
  background: var(--n100);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--sp8) var(--sp4) calc(var(--sp8) + var(--sp6));
  gap: var(--sp6);
}

/* ── STAGE ── */
.app-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--sp5);
}

/* ── DEVICE ── */
.device {
  width: var(--device-w);
  height: var(--device-h);
  background: var(--white);
  border-radius: 44px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-device);
  position: relative;
}
.device::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 44px;
  border: 1px solid rgba(255,255,255,0.12);
  pointer-events: none;
  z-index: 200;
}
.device::after {
  content: '';
  position: absolute;
  inset: 1px;
  border-radius: 43px;
  border: 1px solid rgba(0,0,0,0.08);
  pointer-events: none;
  z-index: 200;
}

/* ── STATUS BAR ── */
.status-bar {
  background: var(--axa);
  height: 46px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--sp6);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.status-time {
  font-size: 15px;
  font-weight: 600;
  color: var(--white);
  letter-spacing: -0.3px;
}
.status-icons { display: flex; align-items: center; gap: 6px; }
.battery {
  width: 25px; height: 12px;
  border: 1.5px solid rgba(255,255,255,0.65);
  border-radius: 3px;
  padding: 2px;
  position: relative;
  display: flex;
  align-items: center;
}
.battery-fill { width: 73%; height: 100%; background: white; border-radius: 1.5px; }
.battery-nub {
  position: absolute; right: -5px; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 6px;
  background: rgba(255,255,255,0.45);
  border-radius: 0 2px 2px 0;
}

/* ── SCREEN WRAP ── */
.screen-wrap {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: var(--n50);
}

/* ── SCREEN ── */
.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--white);
  opacity: 0;
  transform: translateX(32px);
  pointer-events: none;
  transition: opacity 0.30s cubic-bezier(0.4,0,0.2,1),
              transform 0.30s cubic-bezier(0.4,0,0.2,1);
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.screen::-webkit-scrollbar { display: none; }
.screen.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: auto;
}
.screen.exit {
  opacity: 0;
  transform: translateX(-24px);
  pointer-events: none;
}

/* ── PROGRESS BAR ── */
.progress-bar {
  height: 3px;
  background: var(--n150);
  position: sticky;
  top: 0;
  z-index: 50;
  flex-shrink: 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--axa) 0%, var(--success-mid) 100%);
  transition: width 0.55s cubic-bezier(0.4,0,0.2,1);
}

/* ── STEP NAV ── */
.step-nav {
  display: flex;
  align-items: center;
  background: var(--white);
  border-radius: var(--r-pill);
  padding: 5px;
  box-shadow: var(--shadow-md);
  border: 1px solid rgba(0,0,0,0.05);
  gap: 0;
}
.step-sep {
  width: 16px;
  height: 1px;
  background: var(--n200);
  flex-shrink: 0;
}
.step-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: var(--r-pill);
  border: none;
  background: transparent;
  cursor: pointer;
  font-family: var(--font);
  font-size: 12px;
  font-weight: 400;
  color: var(--n400);
  transition: all 0.2s ease;
  white-space: nowrap;
}
.step-btn:hover { background: var(--n100); color: var(--n700); }
.step-btn.active {
  background: var(--axa);
  color: var(--white);
  font-weight: 600;
}
.step-btn.done { color: var(--success); }
.step-btn.done .step-num {
  background: var(--success-light);
  color: var(--success);
}
.step-num {
  width: 19px; height: 19px;
  border-radius: 50%;
  background: var(--n150);
  color: var(--n400);
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}
.step-btn.active .step-num {
  background: rgba(255,255,255,0.22);
  color: var(--white);
}

/* ── RESPONSIVE ── */
@media (max-width: 440px) {
  :root { --device-w: 100vw; --device-h: 100svh; }
  .device { border-radius: 0; height: 100svh; box-shadow: none; }
  .device::before, .device::after { display: none; }
  body { padding: 0; gap: 0; background: var(--white); justify-content: flex-start; }
  .step-nav { display: none; }
  .app-stage { width: 100%; }
}

/* ── PAD BOTTOM ── */
.pb { height: 36px; }

/* ── ACCESSIBILITY — FOCUS ── */
:focus { outline: none; }
:focus-visible {
  outline: 2px solid var(--axa);
  outline-offset: 2px;
}
.btn-primary:focus-visible,
.btn-success:focus-visible {
  outline: 2px solid rgba(255,255,255,0.8);
  outline-offset: 2px;
}

/* ── DISABLED BUTTONS ── */
.btn:disabled {
  opacity: 0.45;
  cursor: not-allowed;
  pointer-events: none;
}
/* ═══════════════════════════
   TOPBAR
═══════════════════════════ */
.topbar {
  background: var(--axa);
  padding: 14px var(--sp5) 15px;
  display: flex;
  align-items: center;
  gap: var(--sp3);
  position: sticky;
  top: 0;
  z-index: 50;
  flex-shrink: 0;
}
.topbar-back {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,0.14);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--white);
  flex-shrink: 0;
  transition: background 0.15s;
}
.topbar-back:hover { background: rgba(255,255,255,0.24); }
.topbar-back svg { width: 18px; height: 18px; }
.topbar-info { flex: 1; }
.topbar-title { font-size: 15px; font-weight: 600; color: var(--white); line-height: 1.2; }
.topbar-sub { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 1px; }

/* ═══════════════════════════
   HERO HEADER
═══════════════════════════ */
.hero {
  background: var(--axa);
  padding: var(--sp5) var(--sp5) var(--sp8);
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  right: -40px; bottom: -40px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(255,255,255,0.03);
}
.hero::after {
  content: '';
  position: absolute;
  right: 30px; bottom: -70px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}
.hero-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: var(--sp4);
}
.hero-icon {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  border: 1.5px solid rgba(255,255,255,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: var(--sp3);
}
.hero-icon svg { width: 26px; height: 26px; fill: rgba(255,255,255,0.9); }
.hero-h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
  margin-bottom: var(--sp2);
  letter-spacing: -0.3px;
}
.hero-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.75);
  line-height: 1.55;
}

/* ═══════════════════════════
   SCORE HERO
═══════════════════════════ */
.score-hero {
  background: var(--axa);
  padding: var(--sp5) var(--sp5) var(--sp6);
  text-align: center;
  position: relative;
  overflow: hidden;
}
.score-hero::before {
  content: '';
  position: absolute;
  top: -50px; right: -50px;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: rgba(255,255,255,0.03);
}
.score-hero-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: var(--sp4);
}
.score-ring-wrap {
  width: 136px; height: 136px;
  margin: 0 auto var(--sp3);
  position: relative;
}
.score-ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.score-ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.score-num {
  font-size: 38px;
  font-weight: 700;
  color: var(--white);
  line-height: 1;
  letter-spacing: -2px;
}
.score-denom { font-size: 14px; color: rgba(255,255,255,0.4); margin-top: 1px; }
.score-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.13);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: var(--r-pill);
  padding: 5px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--white);
  margin-bottom: 5px;
}
.score-tagline { font-size: 12px; color: rgba(255,255,255,0.75); }

/* ═══════════════════════════
   SECTION BODY
═══════════════════════════ */
.body { padding: var(--sp5) var(--sp5) 0; }
.body-sm { padding: var(--sp4) var(--sp5) 0; }

/* ═══════════════════════════
   SECTION TITLE
═══════════════════════════ */
.section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--n300);
  margin-bottom: 16px;
}

/* ═══════════════════════════
   CHIP / TIME INDICATOR
═══════════════════════════ */
.time-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--n500);
  margin-bottom: var(--sp4);
}
.time-chip-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--success-mid);
}

/* ═══════════════════════════
   DATA CARDS (préremplis)
═══════════════════════════ */
.data-card {
  background: var(--axa-xlight);
  border: 1px solid var(--axa-light);
  border-radius: var(--r-md);
  padding: 12px 14px;
  margin-bottom: var(--sp2);
  display: flex;
  gap: var(--sp3);
  align-items: flex-start;
}
.data-card-icon {
  width: 34px; height: 34px;
  border-radius: var(--r-sm);
  background: var(--axa);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.data-card-icon svg { width: 18px; height: 18px; fill: var(--white); }
.data-card-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--n300);
  margin-bottom: 3px;
}
.data-card-value { font-size: 13px; color: var(--n700); line-height: 1.4; }

/* ═══════════════════════════
   FORM FIELD (readonly)
═══════════════════════════ */
.field { margin-bottom: var(--sp2); }
.field-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--n300);
  margin-bottom: 4px;
  padding-left: 2px;
}
.field-value {
  background: var(--n50);
  border: 1px solid var(--n150);
  border-radius: var(--r-sm);
  padding: 11px 13px;
  font-size: 13px;
  color: var(--n700);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp2);
}

/* ═══════════════════════════
   BADGE PREFILL
═══════════════════════════ */
.badge-pre {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: var(--r-pill);
  background: var(--axa-light);
  color: var(--axa);
  flex-shrink: 0;
}

/* ═══════════════════════════
   DIVIDER TEXT
═══════════════════════════ */
.divider {
  display: flex;
  align-items: center;
  gap: var(--sp2);
  margin: var(--sp3) 0;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  color: var(--n300);
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--n150);
}

/* ═══════════════════════════
   QUESTION BLOCK
═══════════════════════════ */
.question { margin-bottom: var(--sp4); }
.q-risk-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: var(--r-pill);
  margin-bottom: 6px;
}
.q-text {
  font-size: 13px;
  font-weight: 600;
  color: var(--n800);
  margin-bottom: var(--sp2);
  line-height: 1.4;
}
.options { display: flex; gap: 6px; flex-wrap: wrap; }
.opt {
  padding: 8px 15px;
  border-radius: var(--r-pill);
  border: 1.5px solid var(--n200);
  background: var(--white);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  color: var(--n500);
  cursor: pointer;
  transition: all 0.15s ease;
}
.opt:hover { border-color: var(--axa-mid); color: var(--axa); }
.opt.sel {
  background: var(--axa);
  border-color: var(--axa);
  color: var(--white);
}

/* ═══════════════════════════
   REASSURANCE BOX
═══════════════════════════ */
.reassure {
  display: flex;
  gap: var(--sp2);
  align-items: flex-start;
  padding: 11px 13px;
  border-radius: var(--r-md);
  font-size: 12px;
  line-height: 1.5;
  margin: var(--sp3) 0;
}
.reassure.green { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-light); }
.reassure.blue { background: var(--axa-xlight); color: var(--axa-dark); border: 1px solid var(--axa-light); }
.reassure-icon svg { width: 14px; height: 14px; flex-shrink: 0; fill: currentColor; margin-top: 1px; }

/* ═══════════════════════════
   BUTTONS
═══════════════════════════ */
.btn {
  width: 100%;
  padding: 14px var(--sp5);
  border-radius: var(--r-md);
  border: none;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp2);
  transition: all 0.15s ease;
  position: relative;
}
.btn:active { transform: scale(0.98); }
.btn-icon { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }

.btn-primary { background: var(--axa); color: var(--white); }
.btn-primary:hover { background: var(--axa-mid); }

.btn-success { background: var(--success); color: var(--white); }
.btn-success:hover { background: var(--success-mid); }

.btn-ghost { background: transparent; color: var(--n500); font-weight: 400; font-size: 13px; padding: 11px; }
.btn-ghost:hover { background: var(--n50); color: var(--n700); }

/* ═══════════════════════════
   RISK BARS
═══════════════════════════ */
.risk-bars { margin-bottom: var(--sp4); }
.risk-bar-row { margin-bottom: var(--sp3); }
.risk-bar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 5px;
}
.risk-bar-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--n700);
  display: flex;
  align-items: center;
  gap: 5px;
}
.risk-bar-label-icon { font-size: 13px; }
.risk-track {
  height: 7px;
  background: var(--n150);
  border-radius: var(--r-pill);
  overflow: hidden;
}
.risk-fill { height: 100%; border-radius: var(--r-pill); transition: width 0.7s cubic-bezier(0.4,0,0.2,1); }
.risk-fill-danger { background: var(--danger-mid); }
.risk-fill-warn { background: var(--warn-mid); }
.risk-fill-success { background: var(--success-mid); }
.risk-fill-info { background: var(--info-mid); }

/* ═══════════════════════════
   TAGS / BADGES
═══════════════════════════ */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: var(--r-pill);
}
.tag-danger  { background: var(--danger-light); color: var(--danger); }
.tag-warn    { background: var(--warn-light);   color: var(--warn); }
.tag-success { background: var(--success-light);color: var(--success); }
.tag-info    { background: var(--info-light);   color: var(--info); }
.tag-neutral { background: var(--n150);         color: var(--n600); }
.tag-white   { background: rgba(255,255,255,0.16); color: var(--white); }
.tag-primary { background: var(--axa-light);    color: var(--axa); }

/* ═══════════════════════════
   CTA BOX
═══════════════════════════ */
.cta-box {
  background: var(--axa-xlight);
  border: 1px solid var(--axa-light);
  border-radius: var(--r-lg);
  padding: var(--sp4);
  margin-top: var(--sp2);
  text-align: center;
}
.cta-text {
  font-size: 13px;
  color: var(--axa-dark);
  line-height: 1.55;
  margin-bottom: var(--sp3);
}
.cta-text strong { font-weight: 700; }

/* ═══════════════════════════
   CONSEIL CARDS
═══════════════════════════ */
.conseil-section { margin-bottom: var(--sp3); }
.conseil-section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.7px;
  text-transform: uppercase;
  color: var(--n300);
  margin-bottom: var(--sp2);
}
.conseil-card {
  background: var(--white);
  border: 1px solid var(--n150);
  border-radius: var(--r-lg);
  padding: 13px 14px;
  margin-bottom: var(--sp2);
  border-left: 3px solid var(--n200);
  box-shadow: var(--shadow-xs);
}
.conseil-card.urgent  { border-left-color: var(--danger-mid); }
.conseil-card.regular { border-left-color: var(--success-mid); }
.conseil-card.deferred{ border-left-color: var(--warn-mid); }
.conseil-risk {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 5px;
}
.conseil-risk-text { font-size: 10px; font-weight: 700; }
.conseil-text {
  font-size: 12px;
  color: var(--n700);
  line-height: 1.55;
  margin-bottom: var(--sp2);
}
.conseil-meta { display: flex; gap: 4px; flex-wrap: wrap; }
.meta-tag {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: var(--r-pill);
  background: var(--n100);
  color: var(--n600);
}
.meta-tag-green { background: var(--success-light); color: var(--success); }
.meta-tag-blue  { background: var(--axa-light);     color: var(--axa); font-weight: 700; }
.meta-tag-amber { background: var(--warn-light);    color: var(--warn); }

/* ═══════════════════════════
   RECO CARDS
═══════════════════════════ */
.reco-card {
  background: var(--white);
  border: 1.5px solid var(--n150);
  border-radius: var(--r-lg);
  padding: 14px 14px;
  margin-bottom: var(--sp2);
  cursor: pointer;
  transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
  box-shadow: var(--shadow-xs);
}
.reco-card:hover { border-color: var(--axa-mid); box-shadow: var(--shadow-sm); }
.reco-card.checked {
  border-color: var(--success-mid);
  background: var(--success-bg);
}
.reco-risk-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: var(--r-pill);
  margin-bottom: 7px;
}
.reco-top { display: flex; align-items: flex-start; gap: var(--sp2); margin-bottom: 6px; }
.reco-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid var(--n200);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
  background: var(--white);
  transition: all 0.2s;
}
.reco-check svg { width: 10px; height: 10px; fill: transparent; transition: fill 0.2s; }
.reco-card.checked .reco-check {
  background: var(--success-mid);
  border-color: var(--success-mid);
}
.reco-card.checked .reco-check svg { fill: var(--white); }
.reco-title { font-size: 14px; font-weight: 700; color: var(--n800); flex: 1; line-height: 1.3; }
.reco-desc { font-size: 12px; color: var(--n500); line-height: 1.5; margin-bottom: 8px; }
.reco-tags { display: flex; gap: 4px; flex-wrap: wrap; }

/* ═══════════════════════════
   SCORE UPDATE BAR
═══════════════════════════ */
.score-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--axa-xlight);
  border: 1px solid var(--axa-light);
  border-radius: var(--r-md);
  padding: 11px 14px;
  margin-top: var(--sp4);
  transition: background 0.3s, border-color 0.3s;
}
.score-bar.ok { background: var(--success-bg); border-color: var(--success-light); }
.score-bar-label { font-size: 11px; color: var(--axa); font-weight: 500; }
.score-bar.ok .score-bar-label { color: var(--success); }
.score-bar-val { font-size: 14px; font-weight: 700; color: var(--axa); }
.score-bar.ok .score-bar-val { color: var(--success-mid); }

/* ═══════════════════════════
   REWARDS HERO
═══════════════════════════ */
.rewards-hero {
  background: var(--axa);
  padding: var(--sp5) var(--sp5) var(--sp6);
}
.rewards-hero-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp2);
  margin-bottom: var(--sp5);
}
.rewards-hero-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  flex: 1;
  text-align: center;
}
.rewards-hero-body { }
.rh-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: rgba(255,255,255,.45);
  margin-bottom: 8px;
}
.rh-title {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
  letter-spacing: -.2px;
  white-space: pre-line;
  margin-bottom: 10px;
}
.rh-sub {
  font-size: 13px;
  color: rgba(255,255,255,.65);
  line-height: 1.5;
}
.rh-sub strong { color: rgba(255,255,255,.9); font-weight: 600; }

/* ═══════════════════════════
   REWARD CARDS
═══════════════════════════ */
.reward-card {
  display: flex;
  align-items: center;
  gap: var(--sp3);
  padding: 13px 14px;
  border-radius: var(--r-lg);
  border: 1px solid var(--n150);
  background: var(--white);
  margin-bottom: var(--sp2);
  transition: border-color 0.18s;
}
.reward-card:hover { border-color: var(--axa-light); }
.reward-card.locked { opacity: 0.6; background: var(--n50); pointer-events: none; }
.reward-icon {
  width: 42px; height: 42px;
  border-radius: var(--r-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.reward-info { flex: 1; min-width: 0; }
.reward-name { font-size: 13px; font-weight: 600; color: var(--n800); margin-bottom: 2px; }
.reward-desc { font-size: 11px; color: var(--n500); }
.reward-right { text-align: right; flex-shrink: 0; }
.reward-pts { font-size: 11px; color: var(--n300); font-weight: 600; white-space: nowrap; }

/* ═══════════════════════════
   REASSURE FOOTER
═══════════════════════════ */
.footer-fine {
  font-size: 11px;
  color: var(--n300);
  text-align: center;
  margin-top: var(--sp3);
  line-height: 1.5;
  padding-bottom: 2px;
}

/* ═══════════════════════════
   BOTTOM SAFE
═══════════════════════════ */
.bottom-safe { height: 36px; }

/* ═══════════════════════════
   TAB BAR
═══════════════════════════ */
.tab-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px 14px;
  background: transparent;
  border-top: none;
  /* floats over screen content */
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 50;
}

/* Screen padding when tab bar visible */
.device.has-tabbar .screen { padding-bottom: 76px; }

/* Main pill — frosted glass capsule */
.tab-main {
  flex: 1;
  display: flex;
  align-items: stretch;
  background: rgba(255,255,255,0.62);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 100px;
  padding: 4px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.10), 0 0 0 1px rgba(255,255,255,0.45);
  min-width: 0;
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 7px 2px 6px;
  border: none;
  background: none;
  border-radius: 100px;
  cursor: pointer;
  font-family: var(--font);
  transition: background 0.15s;
  min-width: 0;
}
.tab-item:hover { background: rgba(255,255,255,0.35); }
.tab-item.active { background: rgba(255,255,255,0.85); box-shadow: 0 1px 6px rgba(0,0,0,0.08); }
.tab-icon {
  width: 20px; height: 20px;
  fill: #5A5A6E;
  flex-shrink: 0;
}
.tab-item.active .tab-icon { fill: var(--axa); }
.tab-label {
  font-size: 10px;
  font-weight: 500;
  color: #5A5A6E;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
  line-height: 1;
}
.tab-item.active .tab-label {
  color: var(--axa);
  font-weight: 700;
}

/* Angel — independent widget circle */
.tab-angel {
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  flex-shrink: 0;
  padding: 0;
  position: relative;
  margin-top: -4px; /* lifts slightly above tab capsule */
}
.tab-angel-circle {
  width: 58px; height: 58px;
  border-radius: 50%;
  background: #6574F8;
  border: 2.5px solid rgba(255,255,255,0.88);
  /* outer white ring matching capsule + blue glow */
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.45),
    0 0 22px rgba(101,116,248,0.55),
    0 0 44px rgba(101,116,248,0.22),
    0 4px 12px rgba(0,0,0,0.14);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.tab-angel:hover .tab-angel-circle {
  transform: scale(1.07);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.45),
    0 0 30px rgba(101,116,248,0.7),
    0 0 56px rgba(101,116,248,0.3),
    0 6px 16px rgba(0,0,0,0.16);
}
.tab-angel-stars {
  width: 28px; height: 28px;
  display: block;
}
.tab-angel-name {
  font-size: 9px;
  font-weight: 700;
  color: #fff;
  font-family: var(--font);
  line-height: 1;
  letter-spacing: 0.3px;
}
.tab-angel-notif {
  position: absolute;
  top: 1px; right: 1px;
  width: 10px; height: 10px;
  background: #EF4444;
  border-radius: 50%;
  border: 1.5px solid #fff;
}

/* Angel — detached circle */
/* ── SCREEN 0 — SCENARIO SELECTION ── */
.sel-hero {
  background: var(--axa);
  padding: var(--sp5) var(--sp5) var(--sp6);
  text-align: center;
}
.sel-logo { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: var(--sp4); }
.sel-title { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -.3px; margin-bottom: 6px; }
.sel-sub { font-size: 13px; color: rgba(255,255,255,.6); line-height: 1.5; }

.sel-section { margin-bottom: var(--sp5); }
.sel-section-label { font-size: 10px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: var(--n300); margin-bottom: var(--sp3); }

.scenario-cards { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp2); }
.scenario-card {
  border: 2px solid var(--n150);
  border-radius: var(--r-lg);
  padding: var(--sp3);
  cursor: pointer;
  transition: all .18s;
  background: #fff;
  text-align: center;
}
.scenario-card:hover { border-color: var(--axa-mid); }
.scenario-card.active-sub { border-color: var(--info-mid); background: var(--info-bg); }
.scenario-card.active-sea { border-color: var(--warn-mid); background: var(--warn-bg); }
.scenario-card-icon { font-size: 24px; margin-bottom: 6px; }
.scenario-card-title { font-size: 12px; font-weight: 700; color: var(--n800); margin-bottom: 2px; }
.scenario-card-sub { font-size: 10px; color: var(--n500); }

.profile-list { display: flex; flex-direction: column; gap: var(--sp2); }
.profile-card {
  display: flex;
  align-items: center;
  gap: var(--sp3);
  border: 1.5px solid var(--n150);
  border-radius: var(--r-lg);
  padding: 11px 14px;
  cursor: pointer;
  transition: all .18s;
  background: #fff;
}
.profile-card:hover { border-color: var(--axa-mid); }
.profile-card.selected {
  border-color: var(--axa); background: var(--axa-xlight);
  box-shadow: 0 0 0 3px rgba(0,0,143,0.08);
}
.profile-avatar { font-size: 26px; width: 42px; height: 42px; border-radius: 50%; background: var(--n100); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.profile-name { font-size: 13px; font-weight: 700; color: var(--n800); }
.profile-loc { font-size: 11px; color: var(--n500); margin-top: 1px; }
.profile-tagline { font-size: 10px; font-weight: 600; margin-top: 3px; }
.profile-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--n200); margin-left: auto; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .18s; }
.profile-card.selected .profile-check { background: var(--axa); border-color: var(--axa); }
.profile-check svg { width: 10px; height: 10px; fill: #fff; }

/* ── SCREEN 1 — LANDING ── */
.landing-banner {
  padding: var(--sp5) var(--sp5) var(--sp8);
  position: relative;
  overflow: hidden;
}
.landing-banner.subscription { background: var(--axa); }
.landing-banner.seasonal     { background: #92400E; }
.landing-banner::before { content:''; position:absolute; right:-30px; bottom:-30px; width:180px; height:180px; border-radius:50%; background:rgba(255,255,255,.04); }
.landing-scenario-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2);
  border-radius: var(--r-pill); padding: 4px 12px;
  font-size: 11px; font-weight: 600; color: #fff; margin-bottom: var(--sp3);
}
.landing-h1 { font-size: 21px; font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: 7px; letter-spacing: -.2px; }
.landing-sub { font-size: 13px; color: rgba(255,255,255,.78); line-height: 1.5; margin-bottom: var(--sp4); }
.landing-profile-row { display: flex; align-items: center; gap: var(--sp2); background: rgba(255,255,255,.12); border-radius: var(--r-md); padding: 10px 13px; }
.landing-profile-avatar { font-size: 22px; }
.landing-profile-name { font-size: 13px; font-weight: 600; color: #fff; }
.landing-profile-detail { font-size: 11px; color: rgba(255,255,255,.6); }

.promises { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp3); margin-bottom: var(--sp4); }
.promise-item { text-align: center; background: var(--n50); border: 1px solid var(--n150); border-radius: var(--r-md); padding: var(--sp3) var(--sp2); }
.promise-icon { font-size: 22px; margin-bottom: 6px; }
.promise-label { font-size: 11px; font-weight: 600; color: var(--n700); line-height: 1.35; }

.alert-box { background: var(--warn-bg); border: 1px solid var(--warn-light); border-radius: var(--r-md); padding: 12px 13px; margin-bottom: var(--sp4); display: flex; gap: var(--sp2); }
.alert-box-icon { font-size: 16px; flex-shrink: 0; }
.alert-box-text { font-size: 12px; color: var(--warn); line-height: 1.5; }

/* ── SCREEN 2 — DIAGNOSTIC ── */
.diag-stepper { display: flex; align-items: center; gap: 0; margin-bottom: var(--sp4); }
.diag-step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--n200); transition: all .3s; flex-shrink: 0; }
.diag-step-dot.done    { background: var(--success-mid); }
.diag-step-dot.current { background: var(--axa); width: 20px; border-radius: 4px; }
.diag-step-line { flex: 1; height: 2px; background: var(--n150); }
.diag-step-line.done { background: var(--success-light); }

.q-card { background: #fff; border: 1.5px solid var(--n150); border-radius: var(--r-lg); padding: var(--sp4); margin-bottom: var(--sp3); }
.q-card-num { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--n300); margin-bottom: var(--sp2); }
.q-card-text { font-size: 14px; font-weight: 600; color: var(--n800); line-height: 1.4; margin-bottom: var(--sp3); }

.option-list { display: flex; flex-direction: column; gap: var(--sp2); }
.opt-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 14px; border-radius: var(--r-md);
  border: 1.5px solid var(--n200); background: var(--n50);
  cursor: pointer; transition: all .15s; font-size: 13px; color: var(--n700); font-family: var(--font);
}
.opt-item:hover { border-color: var(--axa-mid); color: var(--axa); background: var(--axa-xlight); }
.opt-item.sel {
  background: var(--axa); border-color: var(--axa); color: #fff; font-weight: 600;
  animation: selectBounce 0.3s ease;
}
.opt-item.sel .opt-pts { background: rgba(255,255,255,.2); color: #fff; }
.opt-pts { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: var(--r-pill); background: var(--success-light); color: var(--success); transition: all .15s; }
.opt-pts.zero { background: var(--n150); color: var(--n400); }

.diag-nav { display: flex; gap: var(--sp2); padding: var(--sp3) var(--sp5) var(--sp4); border-top: 1px solid var(--n150); background: #fff; position: sticky; bottom: 0; }
.diag-nav-back { flex: 0 0 44px; height: 44px; border-radius: var(--r-sm); border: 1.5px solid var(--n200); background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--n500); }
.diag-nav-back svg { width: 18px; height: 18px; fill: currentColor; }
.diag-nav-next { flex: 1; }

/* ── SCREEN 1 — LANDING VALUE CARD ── */
.diag-value-card {
  background: #F8F5EF; border-radius: 20px;
  padding: var(--sp4) var(--sp4) var(--sp5); margin-bottom: var(--sp2);
}
.diag-value-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  color: var(--axa); margin-bottom: var(--sp3);
}
.diag-value-title {
  font-size: 24px; font-weight: 700; color: var(--n900);
  line-height: 1.15; margin-bottom: var(--sp3); letter-spacing: -0.5px;
}
.diag-value-body { font-size: 13px; color: var(--n600); line-height: 1.6; margin-bottom: var(--sp3); }
.diag-value-checklist { display: flex; flex-direction: column; gap: 8px; }
.diag-value-check { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--n700); line-height: 1.4; }
.diag-check-icon { color: var(--success); font-weight: 800; flex-shrink: 0; }
/* Angel entry card — S1 */
.angel-or-sep {
  display: flex; align-items: center; gap: 10px;
  margin: var(--sp3) 0;
}
.angel-or-line { flex: 1; height: 1px; background: var(--n150); }
.angel-or-label { font-size: 11px; color: var(--n300); font-weight: 500; flex-shrink: 0; }

.angel-entry-card {
  background: rgba(101,116,248,.05);
  border: 1.5px solid rgba(101,116,248,.18);
  border-radius: 20px;
  padding: var(--sp4);
  margin-bottom: var(--sp3);
  cursor: pointer;
  transition: background .18s, border-color .18s;
}
.angel-entry-card:hover { background: rgba(101,116,248,.09); border-color: rgba(101,116,248,.35); }
.angel-entry-head {
  display: flex; align-items: center; gap: 12px; margin-bottom: var(--sp3);
}
.angel-entry-circle {
  width: 44px; height: 44px; border-radius: 50%;
  background: #6574F8;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 14px rgba(101,116,248,.4), 0 0 0 2px rgba(255,255,255,.7);
}
.angel-entry-icon { width: 22px; height: 22px; display: block; }
.angel-entry-text { flex: 1; }
.angel-entry-eyebrow {
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: #6574F8; margin-bottom: 2px;
}
.angel-entry-title { font-size: 15px; font-weight: 700; color: var(--n800); }
.angel-entry-arrow { width: 18px; height: 18px; color: #6574F8; flex-shrink: 0; }
.angel-entry-desc {
  font-size: 12px; color: var(--n500); line-height: 1.5; margin-bottom: var(--sp3);
}
.angel-entry-cta {
  width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
  background: #6574F8; color: #fff; border: none; border-radius: var(--r-md);
  padding: 11px 16px; font-size: 14px; font-weight: 600; font-family: var(--font);
  cursor: pointer; transition: filter .18s;
}
.angel-entry-cta:hover { filter: brightness(1.1); }
.angel-entry-cta .btn-icon { width: 16px; height: 16px; stroke: #fff; }
.angel-entry-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.angel-mode-chip {
  font-size: 10px; font-weight: 600; color: #6574F8;
  background: rgba(101,116,248,.1); border-radius: var(--r-pill);
  padding: 3px 10px;
}

.diag-skip-wrap { text-align: center; margin-bottom: var(--sp2); }
.diag-skip-btn {
  background: none; border: none; cursor: pointer; font-family: var(--font);
  font-size: 13px; color: var(--n400); display: inline-flex; flex-direction: column;
  align-items: center; gap: 2px; padding: var(--sp2) var(--sp3);
  border-radius: var(--r-pill); transition: background .15s;
}
.diag-skip-btn:hover { background: var(--n100); color: var(--n600); }
.diag-skip-note { font-size: 10px; color: var(--n300); }

/* ── SCREEN 3 — RISK MAP ── */
.risk-map-card { border-radius: var(--r-lg); border: 1.5px solid var(--n150); overflow: hidden; margin-bottom: var(--sp4); }
.risk-map-wrap { position: relative; }
.risk-map-bg {
  height: 190px;
  background-color: #EDF3EE;
  background-image:
    linear-gradient(rgba(255,255,255,0.82) 7px, transparent 7px),
    linear-gradient(90deg, rgba(255,255,255,0.82) 7px, transparent 7px);
  background-size: 66px 50px;
}
.risk-map-overlay-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
.risk-map-location {
  position: absolute; top: 8px; left: 8px;
  background: rgba(255,255,255,0.92); border-radius: var(--r-pill);
  padding: 3px 10px; font-size: 10px; font-weight: 700; color: var(--n700);
  font-family: var(--font); backdrop-filter: blur(4px);
}
.risk-map-source {
  position: absolute; bottom: 8px; right: 8px;
  background: rgba(0,0,143,0.88); color: rgba(255,255,255,0.9);
  border-radius: 4px; padding: 2px 7px; font-size: 9px; font-weight: 700;
  font-family: var(--font); letter-spacing: 0.3px;
}
.risk-map-legend { padding: 10px 13px; display: flex; flex-direction: column; gap: 6px; border-top: 1px solid var(--n150); background: var(--n50); }
.risk-map-legend-row { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--n700); }
.risk-map-legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

/* ── SCREEN 3 — SCORE ── */
.score-potential {
  display: flex; align-items: center; justify-content: center; gap: var(--sp2);
  font-size: 12px; color: rgba(255,255,255,0.75); margin-top: var(--sp2);
}
.score-potential-arrow { font-weight: 700; color: var(--success-mid); }
.risk-score-meta { display: flex; align-items: baseline; gap: var(--sp2); margin-top: 4px; }
/* Score CTA card (unified explain + CTA) */
.score-cta-card { background: #F8F5EF; border-radius: 18px; padding: var(--sp4); margin-bottom: var(--sp2); }
.score-cta-eyebrow { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--axa); margin-bottom: var(--sp2); }
.score-cta-title { font-size: 22px; font-weight: 700; color: var(--n900); line-height: 1.2; letter-spacing: -0.4px; margin-bottom: var(--sp3); }
.score-cta-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: var(--sp2); }
.score-cta-chip { font-size: 12px; color: var(--n600); background: rgba(0,0,0,0.07); border-radius: var(--r-pill); padding: 4px 11px; }
.score-cta-chip.scc-green strong { color: var(--success); }
.score-cta-chip.scc-blue strong { color: var(--axa); }
.score-cta-scale { font-size: 10px; color: var(--n400); }
.risk-score-pts { font-size: 11px; font-weight: 700; color: var(--n600); flex-shrink: 0; }
.risk-score-comment { font-size: 11px; color: var(--n400); line-height: 1.4; }

/* ── SCREEN 4 — RISK PROJECTION ── */
.projection-hero { background: var(--axa); padding: var(--sp5) var(--sp5) var(--sp4); }
.projection-risk-icon { font-size: 36px; margin-bottom: var(--sp2); }
.projection-risk-name { font-size: 12px; font-weight: 700; letter-spacing: .8px; text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: 4px; }
.projection-tagline { font-size: 18px; font-weight: 700; color: #fff; line-height: 1.3; }

/* Risk tabs */
.proj-tabs-wrap { margin: var(--sp4) 0 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.proj-tabs-wrap::-webkit-scrollbar { display: none; }
.proj-tabs { display: flex; gap: 8px; padding-bottom: 2px; min-width: max-content; }
.proj-tab { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 16px; border: none; border-radius: 12px; background: rgba(255,255,255,.12); cursor: pointer; transition: background .18s, transform .12s; min-width: 72px; }
.proj-tab:active { transform: scale(.97); }
.proj-tab.active { background: rgba(255,255,255,.26); box-shadow: 0 0 0 1.5px rgba(255,255,255,.35); }
.proj-tab-icon { font-size: 20px; line-height: 1; }
.proj-tab-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,.65); text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; font-family: var(--font); }
.proj-tab.active .proj-tab-label { color: #fff; }

.stat-cards { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp2); margin-bottom: var(--sp4); }
.stat-card { background: var(--n50); border-radius: var(--r-md); padding: var(--sp3) var(--sp3); text-align: center; }
.stat-num { font-size: 26px; font-weight: 700; color: var(--axa); letter-spacing: -1px; line-height: 1; margin-bottom: 3px; }
.stat-label { font-size: 10px; color: var(--n500); line-height: 1.3; }

.damage-list { margin-bottom: var(--sp4); }
.damage-item { display: flex; align-items: center; gap: var(--sp2); padding: 7px 0; border-bottom: 1px solid var(--n150); font-size: 12px; color: var(--n700); }
.damage-item:last-child { border-bottom: none; }
.damage-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--danger-mid); flex-shrink: 0; }

/* Coverage card — S4 */
.coverage-card {
  border: 1.5px solid var(--n150);
  border-radius: var(--r-lg);
  overflow: hidden;
  background: #fff;
  margin-bottom: var(--sp3);
}
.coverage-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp2);
  padding: 12px 14px 10px;
}
.coverage-contract-info {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.coverage-contract-icon {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: var(--axa-xlight);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--axa);
}
.coverage-contract-name {
  font-size: 12px;
  font-weight: 700;
  color: var(--n800);
  line-height: 1.2;
}
.coverage-contract-ref {
  font-size: 10px;
  color: var(--n400);
  margin-top: 1px;
}
.coverage-status-badge {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 9px;
  border-radius: 20px;
  white-space: nowrap;
}
.coverage-status-covered {
  background: #E6F4EA;
  color: #1E7E34;
}
.coverage-status-partial {
  background: #FFF3E0;
  color: #E65100;
}
.coverage-status-not-covered {
  background: #FFEBEE;
  color: #C62828;
}
.coverage-details {
  display: flex;
  align-items: stretch;
  border-top: 1px solid var(--n100);
  border-bottom: 1px solid var(--n100);
}
.coverage-detail-item {
  flex: 1;
  padding: 10px 14px;
  text-align: center;
}
.coverage-detail-sep {
  width: 1px;
  background: var(--n100);
}
.coverage-detail-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: var(--n400);
  margin-bottom: 3px;
}
.coverage-detail-value {
  font-size: 15px;
  font-weight: 700;
  color: var(--n800);
  letter-spacing: -.3px;
}
.coverage-note {
  padding: 9px 14px 7px;
  font-size: 11px;
  color: var(--n600);
  line-height: 1.5;
  border-top: 1px solid var(--n100);
}
.coverage-cg-ref {
  padding: 5px 14px 9px;
  font-size: 10px;
  font-weight: 600;
  color: var(--n400);
  letter-spacing: .2px;
}
.coverage-prevention-nudge {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 10px 14px;
  background: var(--axa-xlight);
  border-top: 1px solid rgba(0,0,143,0.08);
}
.coverage-prevention-icon {
  flex-shrink: 0;
  margin-top: 1px;
  color: var(--axa);
  opacity: .7;
}
.coverage-prevention-text {
  font-size: 11px;
  color: var(--axa);
  line-height: 1.5;
}
.coverage-prevention-text strong { font-weight: 700; }

/* ── SCREEN 5 — ACTION PLAN ── */
.actions-header { background: var(--axa); padding: var(--sp4) var(--sp5) var(--sp5); }
.ah-toprow { display: flex; align-items: center; gap: var(--sp2); margin-bottom: var(--sp4); }
.ah-eyebrow { flex: 1; font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: rgba(255,255,255,0.5); }
.ah-score-row { margin-bottom: 4px; }
.ah-score-num { font-size: 48px; font-weight: 700; color: #fff; letter-spacing: -2px; line-height: 1; }
.ah-score-denom { font-size: 20px; font-weight: 400; color: rgba(255,255,255,0.5); letter-spacing: -0.5px; }
.ah-subtitle { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: var(--sp4); }
.ah-progress-track { height: 6px; background: rgba(255,255,255,0.18); border-radius: var(--r-pill); overflow: hidden; margin-bottom: 5px; }
.ah-progress-fill { height: 100%; background: var(--success-mid); border-radius: var(--r-pill); transition: width .6s cubic-bezier(0.22,1,0.36,1); }
.ah-progress-labels { display: flex; justify-content: space-between; font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.4); }
.actions-title {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}
.actions-sub {
  font-size: 12px;
  color: rgba(255,255,255,0.65);
}

/* ── SCREEN 6 — ACTION DETAIL ── */
.detail-header { background: var(--axa); padding: var(--sp5) var(--sp5) var(--sp6); }
.detail-risk-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: var(--r-pill); margin-bottom: var(--sp3); }
.detail-title { font-size: 20px; font-weight: 700; color: #fff; line-height: 1.2; margin-bottom: var(--sp3); letter-spacing: -.2px; }
.detail-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.detail-chip { font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: var(--r-pill); background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.18); color: #fff; }

.conseil-axa-box { background: var(--axa-xlight); border: 1px solid var(--axa-light); border-radius: var(--r-md); padding: 12px 14px; margin-bottom: var(--sp4); display: flex; gap: var(--sp2); }
.conseil-axa-icon svg { width: 16px; height: 16px; fill: var(--axa); flex-shrink: 0; margin-top: 2px; }
.conseil-axa-text { font-size: 12px; color: var(--axa-dark); line-height: 1.6; font-style: italic; }

.steps-list { margin-bottom: var(--sp4); }
.step-item { display: flex; gap: var(--sp3); align-items: flex-start; margin-bottom: 10px; }
.step-num-badge { width: 24px; height: 24px; border-radius: 50%; background: var(--axa); color: #fff; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.step-text { font-size: 13px; color: var(--n700); line-height: 1.5; flex: 1; padding-top: 3px; }

.benefit-box { background: var(--success-bg); border: 1px solid var(--success-light); border-radius: var(--r-md); padding: 11px 13px; margin-bottom: var(--sp4); display: flex; gap: var(--sp2); align-items: flex-start; }
.benefit-box svg { width: 15px; height: 15px; fill: var(--success); flex-shrink: 0; margin-top: 2px; }
.benefit-text { font-size: 12px; color: var(--success); line-height: 1.5; }

.pts-gain-banner { display: flex; align-items: center; justify-content: space-between; background: var(--axa-xlight); border-radius: var(--r-md); padding: 11px 14px; margin-bottom: var(--sp4); border: 1px solid var(--axa-light); }
.pts-gain-label { font-size: 12px; color: var(--axa); }
.pts-gain-val { font-size: 18px; font-weight: 700; color: var(--axa); }

.detail-sticky {
  padding: var(--sp3) var(--sp5) var(--sp4);
  border-top: 1px solid var(--n150);
  background: #fff; position: sticky; bottom: 0;
  box-shadow: 0 -2px 12px rgba(0,0,0,0.07);
}

/* ── SCREEN 7 — SUCCESS ── */
.success-hero { background: var(--success); padding: var(--sp6) var(--sp5); text-align: center; }
.success-icon { font-size: 44px; margin-bottom: var(--sp3); }
.success-title { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 5px; letter-spacing: -.3px; }
.success-sub { font-size: 13px; color: rgba(255,255,255,.75); }

.score-before-after { display: flex; align-items: center; justify-content: center; gap: var(--sp4); margin: var(--sp4) 0; }
.score-ba-block { text-align: center; }
.score-ba-num { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
.score-ba-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }
.score-ba-before { color: var(--n400); }
.score-ba-after  { color: var(--success); }
.score-ba-arrow  { font-size: 20px; color: var(--n300); }
.score-delta { display: inline-flex; align-items: center; gap: 4px; background: var(--success-light); color: var(--success); font-size: 13px; font-weight: 700; padding: 4px 12px; border-radius: var(--r-pill); margin-bottom: var(--sp4); }

.action-done-card { background: var(--success-bg); border: 1px solid var(--success-light); border-radius: var(--r-lg); padding: 13px 14px; margin-bottom: var(--sp4); }
.action-done-header { display: flex; align-items: center; gap: var(--sp2); margin-bottom: 5px; }
.action-done-check { width: 22px; height: 22px; border-radius: 50%; background: var(--success-mid); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.action-done-check svg { width: 11px; height: 11px; fill: #fff; }
.action-done-title { font-size: 13px; font-weight: 600; color: var(--n800); }
.action-done-conseil { font-size: 11px; color: var(--n500); line-height: 1.5; font-style: italic; margin-top: 4px; }

.toast-reward { background: var(--axa); border-radius: var(--r-lg); padding: 13px 14px; margin-bottom: var(--sp4); display: flex; align-items: center; gap: var(--sp3); }
.toast-icon { font-size: 22px; flex-shrink: 0; }
.toast-title { font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 2px; }
.toast-sub { font-size: 11px; color: rgba(255,255,255,.65); }

.next-action-card { border: 1.5px solid var(--axa-light); border-radius: var(--r-lg); padding: 12px 14px; display: flex; align-items: center; gap: var(--sp3); cursor: pointer; transition: border-color .15s; }
.next-action-card:hover { border-color: var(--axa-mid); }
.next-action-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--axa); margin-bottom: 3px; }
.next-action-title { font-size: 13px; font-weight: 600; color: var(--n800); }
.next-action-arrow { margin-left: auto; font-size: 18px; color: var(--axa); flex-shrink: 0; }

/* ══════════════════════════════════════════
   V2 — NOUVEAUX COMPOSANTS
══════════════════════════════════════════ */

/* ── LANDING V2 — Risk preview cards ── */
.risk-preview-list { display: flex; flex-direction: column; gap: var(--sp2); margin-bottom: var(--sp4); }
.risk-preview-card {
  display: flex; align-items: center; gap: var(--sp3);
  background: #fff; border: 1px solid var(--n150);
  border-radius: var(--r-md); padding: 10px 13px;
  box-shadow: var(--shadow-xs);
}
.risk-preview-icon { font-size: 22px; flex-shrink: 0; width: 32px; text-align: center; }
.risk-preview-info { flex: 1; min-width: 0; }
.risk-preview-label { font-size: 13px; font-weight: 600; color: var(--n800); }
.risk-preview-pct { font-size: 11px; color: var(--n500); margin-top: 1px; }

/* ── DIAGNOSTIC V2 — Risk banner ── */
.q-card-risk-banner {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 12px; border-radius: var(--r-sm);
  margin-bottom: var(--sp3);
}

/* ── SCORE V2 — Explanation box ── */
.score-explain-box {
  background: var(--n50); border: 1px solid var(--n150);
  border-radius: var(--r-md); padding: 16px 14px;
  margin-bottom: var(--sp4);
}
.score-explain-title { font-size: 13px; font-weight: 700; color: var(--n700); margin-bottom: var(--sp3); }
.score-explain-body { display: flex; flex-direction: column; }
.score-explain-row {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 13px; color: var(--n600);
  padding: 8px 0; border-bottom: 1px solid var(--n100);
}
.score-explain-row:last-child { border-bottom: none; }
.score-explain-val { font-weight: 700; color: var(--n800); font-size: 14px; }
.score-explain-val.success { color: var(--success); }
.score-explain-divider { height: 1px; background: var(--n150); margin: 4px 0; }

/* ── ACTIONS V2 — Plan score bar ── */
.plan-score-bar {
  background: var(--n50); border: 1px solid var(--n150);
  border-radius: var(--r-md); padding: 11px 13px;
  margin-bottom: var(--sp3);
}
.plan-score-info { display: flex; justify-content: space-between; margin-bottom: 7px; }
.plan-score-label { font-size: 11px; font-weight: 600; color: var(--n600); text-transform: uppercase; letter-spacing: .4px; }
.plan-score-val { font-size: 13px; font-weight: 700; color: var(--n800); }
.plan-score-track { height: 6px; background: var(--n150); border-radius: var(--r-pill); overflow: hidden; }
.plan-score-fill { height: 100%; background: var(--warn-mid); border-radius: var(--r-pill); transition: width .4s ease; }
.plan-score-fill.ok { background: var(--success-mid); }

/* ── ACTIONS V2 — Card redesign ── */
.reco-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.reco-benefit {
  font-size: 12px; color: var(--n600); line-height: 1.5;
  margin-top: var(--sp2); padding-top: var(--sp2);
  border-top: 1px solid var(--n100);
}

/* ── ACTIONS V2 — Expand button ── */
.btn-expand-actions {
  width: 100%; padding: 12px 16px;
  border: 1.5px dashed var(--axa-mid); border-radius: var(--r-md);
  background: var(--axa-xlight); color: var(--axa); font-size: 13px; font-weight: 600;
  cursor: pointer; text-align: center; margin: var(--sp3) 0;
  transition: background .15s, border-color .15s, box-shadow .15s;
  font-family: var(--font);
}
.btn-expand-actions:hover { background: var(--axa-light); border-color: var(--axa); box-shadow: var(--shadow-xs); }

/* ── REWARDS V2 — Philosophy ── */
.rewards-philosophy {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--axa-xlight); border: 1px solid var(--axa-light);
  border-radius: var(--r-md); padding: 11px 13px;
  margin-bottom: var(--sp4);
}
.rewards-philosophy p { font-size: 13px; font-weight: 500; color: var(--axa-dark); line-height: 1.6; margin: 0; }

/* ── SCREEN 9 — MON SUIVI ── */
.suivi-hero-profile-line {
  font-size: 11px; color: rgba(255,255,255,0.45); text-align: center;
  margin-bottom: var(--sp3); letter-spacing: .3px;
}
.suivi-hero-badges {
  display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
}
.score-badge-tier {
  background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12);
}
.suivi-potential-card {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  background: #F8F5EF; border-radius: var(--r-lg); padding: 16px 14px 16px 16px;
  cursor: pointer; margin-bottom: 2px;
  transition: filter .18s;
}
.suivi-potential-card:hover { filter: brightness(.97); }
.suivi-potential-card-body { flex: 1; }
.suivi-potential-eyebrow {
  font-size: 9px; font-weight: 700; letter-spacing: .9px; text-transform: uppercase;
  color: var(--n400); margin-bottom: 4px;
}
.suivi-potential-main { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.suivi-potential-num { font-size: 30px; font-weight: 700; color: var(--axa); letter-spacing: -1px; line-height: 1; }
.suivi-potential-denom { font-size: 14px; color: var(--n400); font-weight: 500; }
.suivi-potential-gain {
  font-size: 12px; font-weight: 700; color: var(--success);
  background: var(--success-light); border-radius: var(--r-pill); padding: 2px 9px;
}
.suivi-potential-hint { font-size: 11px; color: var(--n500); line-height: 1.4; }
.suivi-potential-card .next-action-arrow { color: var(--axa); width: 20px; height: 20px; flex-shrink: 0; }
.suivi-hero {
  background: linear-gradient(145deg, var(--axa) 0%, var(--axa-mid) 100%);
  padding: var(--sp5) var(--sp5) var(--sp6);
  text-align: center;
}
.suivi-hero-arch {
  height: 28px;
  background: var(--white);
  border-radius: 50% 50% 0 0 / 28px 28px 0 0;
  margin-top: -28px;
  position: relative;
  z-index: 5;
}
.suivi-ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; }
.suivi-ring-center { position: absolute; text-align: center; }
.suivi-score-num { font-size: 26px; font-weight: 700; color: #fff; line-height: 1; letter-spacing: -1px; }
.suivi-score-denom { font-size: 12px; color: rgba(255,255,255,.55); }

.suivi-done-list { display: flex; flex-direction: column; gap: var(--sp2); margin-bottom: var(--sp4); }
.suivi-done-item {
  display: flex; align-items: flex-start; gap: var(--sp3);
  background: var(--success-bg); border: 1px solid var(--success-light);
  border-radius: var(--r-md); padding: 10px 12px;
}
.suivi-done-check {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--success-mid); display: flex; align-items: center;
  justify-content: center; flex-shrink: 0; margin-top: 1px;
}
.suivi-done-title { font-size: 12px; font-weight: 600; color: var(--n800); }
.suivi-done-risk { font-size: 11px; color: var(--n500); margin-top: 1px; }

.suivi-reward-item {
  display: flex; align-items: center; gap: var(--sp3);
  background: var(--n50); border: 1px solid var(--n150);
  border-radius: var(--r-md); padding: 11px 13px;
  margin-bottom: var(--sp2);
}

.suivi-nav-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: var(--sp2); margin-top: var(--sp2);
}
.suivi-nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  background: var(--n50); border: 1px solid var(--n150);
  border-radius: var(--r-md); padding: var(--sp3) var(--sp2);
  cursor: pointer; font-size: 11px; font-weight: 600; color: var(--n700);
  font-family: var(--font); transition: background .15s;
}
.suivi-nav-btn:hover { background: var(--axa-xlight); border-color: var(--axa-light); color: var(--axa); }

/* ── V2.1 — LOCATAIRE NOTICE ── */
.locataire-notice {
  display: flex; align-items: flex-start; gap: var(--sp3);
  background: var(--warn-bg); border: 1px solid var(--warn-light);
  border-radius: var(--r-md); padding: 12px 14px;
  margin-bottom: var(--sp3);
}

/* ── S6 — SERVICES RECOMMANDÉS ── */
.services-list { display: flex; flex-direction: column; gap: var(--sp2); }
.service-card {
  display: flex; align-items: center; gap: var(--sp3);
  background: #fff; border: 1px solid var(--n150);
  border-radius: var(--r-md); padding: 11px 13px;
  box-shadow: var(--shadow-xs);
}
.service-logo { font-size: 20px; flex-shrink: 0; width: 32px; text-align: center; }
.service-info { flex: 1; min-width: 0; }
.service-label { font-size: 13px; font-weight: 600; color: var(--n800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.service-tag   { font-size: 11px; color: var(--n500); margin-top: 1px; }
.service-cta {
  font-size: 11px; font-weight: 600; color: var(--axa);
  background: var(--axa-xlight); border: 1px solid var(--axa-light);
  border-radius: var(--r-sm); padding: 5px 10px;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  font-family: var(--font); transition: background .15s;
}
.service-cta:hover { background: var(--axa-light); }

.service-card-aide { background: var(--n50); border-color: var(--n200); }
.service-cta-aide { color: var(--n700); background: #fff; border-color: var(--n200); }
.service-cta-aide:hover { background: var(--n100); }

/* ── S6 — TUTORIELS ET CONSEILS ── */
.tutos-list { display: flex; flex-direction: column; gap: var(--sp2); }
.tuto-card {
  display: flex; align-items: center; gap: var(--sp3);
  background: #fff; border: 1px solid var(--n150);
  border-radius: var(--r-md); padding: 11px 13px;
  box-shadow: var(--shadow-xs); cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
}
.tuto-card:hover { border-color: var(--axa-mid); box-shadow: var(--shadow-sm); }
.tuto-type-pill {
  font-size: 10px; font-weight: 700; padding: 3px 8px;
  border-radius: var(--r-sm); white-space: nowrap; flex-shrink: 0;
}
.tuto-type-video   { background: #DBEAFE; color: #1D4ED8; }
.tuto-type-pdf     { background: #FEE2E2; color: #B91C1C; }
.tuto-type-article { background: #D1FAE5; color: #065F46; }
.tuto-info { flex: 1; min-width: 0; }
.tuto-title { font-size: 13px; font-weight: 600; color: var(--n800); line-height: 1.35; }
.tuto-meta  { font-size: 11px; color: var(--n500); margin-top: 2px; }
.tuto-arrow { font-size: 18px; color: var(--n300); flex-shrink: 0; line-height: 1; }

/* ── S6/S7 — PROOF OF ACTION ── */
.proof-section {
  border: 1.5px solid var(--n150);
  border-radius: var(--r-lg);
  padding: 12px 14px;
  background: #fff;
  margin-bottom: var(--sp3);
}
.proof-section-done {
  border-color: rgba(52,168,83,.25);
  background: #F0FAF2;
}
.proof-section-row {
  display: flex;
  align-items: center;
  gap: 10px;
}
.proof-type-icon {
  font-size: 22px;
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  background: var(--n100);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.proof-done-icon {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #E6F4EA;
  display: flex;
  align-items: center;
  justify-content: center;
}
.proof-section-info { flex: 1; min-width: 0; }
.proof-done-info { flex: 1; min-width: 0; }
.proof-section-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--n800);
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 2px;
}
.proof-done-label {
  font-size: 12px;
  font-weight: 700;
  color: #1E7E34;
  margin-bottom: 2px;
}
.proof-section-sub,
.proof-done-sub {
  font-size: 11px;
  color: var(--n500);
  line-height: 1.35;
}
.proof-optional-tag {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .4px;
  text-transform: uppercase;
  background: var(--n100);
  color: var(--n500);
  padding: 2px 6px;
  border-radius: 10px;
  flex-shrink: 0;
}
.proof-done-badge {
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 700;
  background: #E6F4EA;
  color: #1E7E34;
  padding: 3px 8px;
  border-radius: 12px;
}
.proof-upload-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  margin-top: 10px;
  padding: 9px;
  border: 1.5px dashed var(--axa-mid);
  border-radius: var(--r-md);
  background: var(--axa-xlight);
  color: var(--axa);
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  transition: background .15s;
}
.proof-upload-btn:hover { background: rgba(0,0,143,.08); }
.proof-pending-hint {
  margin-top: 9px;
  font-size: 11px;
  color: var(--n400);
  line-height: 1.4;
  padding: 7px 10px;
  background: var(--n50);
  border-radius: var(--r-sm);
}

/* S7 — Proof nudge card */
.proof-nudge-card {
  border: 1.5px solid rgba(0,0,143,.15);
  border-radius: var(--r-lg);
  padding: 14px;
  background: var(--axa-xlight);
  margin-bottom: var(--sp3);
}
.proof-nudge-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}
.proof-nudge-icon-wrap {
  font-size: 22px;
  flex-shrink: 0;
  width: 38px;
  height: 38px;
  background: rgba(0,0,143,.08);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.proof-nudge-content { flex: 1; min-width: 0; }
.proof-nudge-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--axa);
  margin-bottom: 3px;
}
.proof-nudge-desc {
  font-size: 11px;
  color: var(--axa-mid);
  line-height: 1.45;
  margin-bottom: 4px;
}
.proof-nudge-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--axa);
  opacity: .65;
}
.proof-nudge-actions {
  display: flex;
  gap: 8px;
}
.proof-nudge-cta {
  flex: 1;
  padding: 9px;
  background: var(--axa);
  color: #fff;
  border: none;
  border-radius: var(--r-md);
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
}
.proof-nudge-skip {
  padding: 9px 14px;
  background: transparent;
  color: var(--n500);
  border: 1.5px solid var(--n150);
  border-radius: var(--r-md);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
}

/* ── S6 — CONSEILLER AXA ── */
.conseiller-card {
  background: linear-gradient(135deg, var(--axa) 0%, #001E96 100%);
  border-radius: var(--r-lg); padding: 16px 14px;
  box-shadow: var(--shadow-sm);
}
.conseiller-top { display: flex; align-items: center; gap: var(--sp3); margin-bottom: var(--sp4); }
.conseiller-avatar {
  font-size: 26px; width: 44px; height: 44px;
  background: rgba(255,255,255,0.12); border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.conseiller-title { font-size: 14px; font-weight: 700; color: #fff; }
.conseiller-sub   { font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 2px; }
.conseiller-actions { display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp2); }
.btn-rappel, .btn-chat {
  padding: 10px; border-radius: var(--r-md); border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: var(--font); transition: opacity .15s;
}
.btn-rappel { background: #fff; color: var(--axa); }
.btn-chat   { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.25); }
.btn-rappel:hover { opacity: 0.9; }
.btn-chat:hover   { background: rgba(255,255,255,0.22); }

/* ── S9 — QUICK ACTION CARDS (à cheval) ── */
.suivi-quick-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  padding: 0 var(--sp4);
  margin-top: -76px;
  position: relative;
  z-index: 10;
  margin-bottom: var(--sp5);
}
.suivi-quick-card {
  background: #fff;
  border-radius: 18px;
  padding: 16px 8px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  border: none;
  box-shadow: 0 4px 18px rgba(0,0,47,0.14);
  cursor: pointer;
  font-family: var(--font);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  -webkit-tap-highlight-color: transparent;
  text-align: center;
}
.suivi-quick-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 22px rgba(0,0,47,0.18);
}
.suivi-quick-card:active { transform: scale(0.97); }
.suivi-quick-icon {
  width: 46px; height: 46px;
  border-radius: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}
.suivi-quick-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--n800);
  line-height: 1.3;
}

/* ── S9 — DIAGNOSTIC CTA BANNER ── */
.suivi-diag-cta-wrap {
  padding: 0 var(--sp4);
  margin-top: calc(-1 * var(--sp3));
  margin-bottom: var(--sp3);
  position: relative;
  z-index: 9;
}
.suivi-diag-cta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  background: var(--axa-xlight);
  border: 1.5px solid var(--axa-light);
  border-radius: 18px;
  padding: 16px 8px 16px 20px;
  cursor: pointer;
  font-family: var(--font);
  box-shadow: 0 2px 10px rgba(0,0,47,0.07);
  overflow: hidden;
  transition: background .15s, box-shadow .15s;
  text-align: left;
}
.suivi-diag-cta:hover {
  background: var(--axa-light);
  box-shadow: 0 4px 14px rgba(0,0,47,0.12);
}
.suivi-diag-cta:active { transform: scale(0.98); }
.suivi-diag-cta-text { flex: 1; }
.suivi-diag-cta-label {
  font-size: 15px;
  font-weight: 700;
  color: var(--axa);
  line-height: 1.2;
}
.suivi-diag-cta-sub {
  font-size: 11px;
  color: var(--axa-mid);
  margin-top: 3px;
}
.suivi-diag-cta-visual {
  position: relative;
  width: 72px;
  height: 60px;
  flex-shrink: 0;
}
.suivi-diag-cta-card {
  position: absolute;
  right: -4px;
  bottom: -8px;
  width: 60px;
  height: 60px;
  background: var(--axa);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  transform: rotate(8deg);
  box-shadow: 0 4px 12px rgba(0,0,143,0.25);
}

/* ── S3 — LOCAL CONTEXT ── */

/* Geo zone row (inside map card) */
.geo-zone-row {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  padding: 8px 14px 4px;
  border-top: 1px solid var(--n100);
  margin-top: 2px;
}
.geo-zone-icon { font-size: 13px; flex-shrink: 0; line-height: 1.4; }
.geo-zone-label {
  font-size: 11px;
  color: var(--n600);
  font-weight: 500;
  line-height: 1.4;
}

/* PCS badge (inside map card) */
.pcs-badge {
  margin: 2px 14px 10px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 700;
  color: #166534;
  background: #dcfce7;
  border: 1px solid #bbf7d0;
  border-radius: var(--r-pill);
  padding: 3px 10px;
  width: fit-content;
  letter-spacing: 0.01em;
}

/* Recent event banner */
.local-event-banner {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: rgba(245,158,11,0.07);
  border: 1px solid rgba(245,158,11,0.28);
  border-radius: var(--r-lg);
  padding: 11px 14px;
  margin-bottom: var(--sp3);
}
.local-event-year {
  font-size: 11px;
  font-weight: 800;
  color: #92400e;
  background: rgba(245,158,11,0.18);
  border-radius: var(--r-pill);
  padding: 2px 8px;
  flex-shrink: 0;
  line-height: 1.6;
}
.local-event-body { flex: 1; min-width: 0; }
.local-event-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--n800);
  margin-bottom: 2px;
}
.local-event-detail {
  font-size: 11px;
  color: var(--n600);
  line-height: 1.4;
}

/* Local stat line (inside risk bar row) */
.local-stat-line {
  display: flex;
  align-items: baseline;
  gap: 5px;
  margin-top: 5px;
  padding: 5px 8px;
  background: rgba(0,0,143,0.04);
  border-radius: var(--r-sm);
  border-left: 2.5px solid rgba(0,0,143,0.25);
}
.local-stat-icon { font-size: 10px; flex-shrink: 0; }
.local-stat-text {
  font-size: 11px;
  font-weight: 500;
  color: var(--n700);
  flex: 1;
  line-height: 1.35;
}
.local-stat-source {
  font-size: 9.5px;
  color: var(--n400);
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: 4px;
}

/* Testimonial card */
.testimonial-card {
  background: #fff;
  border: 1px solid var(--n150);
  border-radius: var(--r-lg);
  padding: 14px;
  margin-bottom: var(--sp3);
  box-shadow: var(--shadow-sm);
}
.testimonial-eyebrow {
  font-size: 9.5px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--axa);
  margin-bottom: 6px;
}
.testimonial-situation {
  font-size: 11px;
  font-weight: 600;
  color: var(--n600);
  margin-bottom: 6px;
}
.testimonial-text {
  font-size: 12px;
  color: var(--n800);
  line-height: 1.5;
  font-style: italic;
  margin-bottom: 8px;
}
.testimonial-source {
  font-size: 10px;
  color: var(--n400);
  font-style: normal;
}

/* ── S9 — BILAN EXPORT ── */
.bilan-export-card {
  background: #fff;
  border: 1.5px solid rgba(0,0,143,0.18);
  border-radius: var(--r-lg);
  padding: 14px;
  margin-bottom: var(--sp4);
  box-shadow: 0 2px 12px rgba(0,0,143,0.08);
}
.bilan-export-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
}
.bilan-export-doc-icon {
  font-size: 28px;
  line-height: 1;
  flex-shrink: 0;
}
.bilan-export-info { flex: 1; }
.bilan-export-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--n900);
}
.bilan-export-sub {
  font-size: 11px;
  color: var(--n500);
  margin-top: 2px;
  line-height: 1.4;
}
.bilan-export-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 12px;
}
.bilan-chip {
  font-size: 10.5px;
  font-weight: 600;
  color: var(--axa);
  background: rgba(0,0,143,0.06);
  border: 1px solid rgba(0,0,143,0.14);
  border-radius: var(--r-pill);
  padding: 3px 9px;
}
.bilan-export-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.bilan-btn-primary {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  background: var(--axa);
  color: #fff;
  border: none;
  border-radius: var(--r-md);
  font-size: 12px;
  font-weight: 700;
  font-family: var(--font);
  cursor: pointer;
  transition: opacity .15s;
}
.bilan-btn-primary:hover { opacity: 0.88; }
.bilan-btn-secondary {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px;
  background: transparent;
  color: var(--axa);
  border: 1.5px solid rgba(0,0,143,0.3);
  border-radius: var(--r-md);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: background .15s;
}
.bilan-btn-secondary:hover { background: rgba(0,0,143,0.05); }

/* ── S2 — DIAGNOSTIC HINT ── */
.q-hint {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  background: rgba(0,0,143,0.05);
  border-radius: var(--r-sm);
  padding: 7px 10px;
  margin: -2px 0 10px;
  font-size: 11px;
  color: var(--n600);
  line-height: 1.45;
}
.q-hint-icon {
  flex-shrink: 0;
  font-size: 11px;
  font-weight: 700;
  color: var(--axa);
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 1.5px solid var(--axa);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  font-style: normal;
  line-height: 1;
}

/* ── S3 — DIAGNOSTIC IMPACT (risk bars + banner) ── */
.diag-impact-banner {
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(52,168,83,0.07);
  border: 1px solid rgba(52,168,83,0.25);
  border-radius: var(--r-md);
  padding: 9px 12px;
  margin-bottom: var(--sp3);
}
.diag-impact-icon { font-size: 18px; flex-shrink: 0; }
.diag-impact-title {
  font-size: 12px;
  font-weight: 700;
  color: #166534;
}
.diag-impact-sub {
  font-size: 11px;
  color: #15803d;
  margin-top: 1px;
}

.risk-diag-impact {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 5px;
  font-size: 11px;
  flex-wrap: wrap;
}
.risk-level-old {
  color: var(--n400);
  text-decoration: line-through;
  font-weight: 500;
}

.plan-group-sub {
  font-size: 11px;

  align-items: center;

.plan-card-body {

.plan-card-risk {

  letter-spacing: 0.05em;
  margin-bottom: 2px;

.plan-card-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--n900);

.plan-card-tags {

  font-weight: 500;

.plan-pts-col {

  font-weight: 700;
  color: var(--n900);
}
.plan-reward-sub {

  color: var(--n500);

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }

@keyframes scaleIn {

  to   { opacity: 1; transform: scale(1); }

@keyframes ringFill {
  from { stroke-dashoffset: 352; }
